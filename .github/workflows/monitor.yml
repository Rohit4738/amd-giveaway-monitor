name: AMD Giveaway Monitor

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: amd-giveaway-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ROLE_PING: ${{ secrets.ROLE_PING }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amd_state.json
          git diff --staged --quiet || git commit -m "Update giveaway state [skip ci]"
          git push
